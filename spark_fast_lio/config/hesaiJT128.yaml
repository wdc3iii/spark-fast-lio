/**:
  ros__parameters:
    common:
      lid_topic:  "/lidar_points"
      imu_topic:  "/lidar_imu"
      time_sync_en: false
      map_frame: "map"

    preprocess:
      lidar_type: 5                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 5 for Hesai
      scan_line: 128
      blind: 0.5
      scan_rate: 10

    mapping:
      acc_cov: 0.1
      gyr_cov: 0.1
      b_acc_cov: 0.0001
      b_gyr_cov: 0.0001
      fov_degree:    360.0
      det_range:     150.0
      extrinsic_est_en:  false
      extrinsic_T: [ -0.00862, 0.00914, 0.03916 ]
      extrinsic_R: [1., 0., 0.,
                    0., 1., 0.,
                    0., 0., 1.]

    publish:
      path_en:  false
      scan_publish_en:  true
      dense_publish_en: true
      scan_bodyframe_pub_en: true

    pcd_save:
      pcd_save_en: true
      interval: -1
